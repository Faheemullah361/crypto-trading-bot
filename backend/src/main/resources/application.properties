server.port=${PORT:10000}
server.servlet.context-path=/

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:crypto_trading;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=false

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# WebSocket Configuration
spring.web.socket.enabled=true
server.tomcat.web-socket-server=true

# Frontend origin allow-list for deployed environments
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:3000}
app.websocket.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:3000}

# Trading Bot Configuration
trading.bot.enabled=true
trading.bot.interval=60000
trading.strategy.type=RSI

# API Keys
api.coingecko.url=https://api.coingecko.com/api/v3
api.binance.url=https://api.binance.com/api/v3

# Logging
logging.level.root=INFO
logging.level.com.cryptotrading=DEBUG

# Application Info
app.name=Crypto Trading Bot
app.version=1.0
