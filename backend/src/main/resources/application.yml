server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:crypto_trading;DB_CLOSE_DELAY=-1;MODE=LEGACY
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

api:
  coinmarketcap:
    key: your_api_key

trading:
  strategy:
    type: simple
    parameters:
      buy_threshold: 0.05
      sell_threshold: 0.05

websocket:
  enabled: true
  endpoint: /ws/crypto

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173,http://localhost:3000}
  websocket:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173,http://localhost:3000}